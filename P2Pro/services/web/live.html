<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2Pro Live Viewer</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c23;
      --panel2: #222833;
      --text: #e9edf3;
      --muted: #aab3c2;
      --border: #2d3440;
      --accent: #3f8cff;
      --danger: #7e3140;
      --ok: #245942;
      --warn: #7a6427;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    .wrap {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.7fr);
      gap: 16px;
      padding: 16px;
      min-height: 100vh;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .stream-wrap {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .stream {
      width: 100%;
      display: block;
      background: #000;
      user-select: none;
    }
    .overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      cursor: crosshair;
    }

    #colorbarContainer {
      position: absolute;
      right: 12px;
      top: 12px;
      bottom: 12px;
      width: 60px;
      pointer-events: none;
      display: none;
      flex-direction: column;
      justify-content: space-between;
      align-items: flex-end;
    }
    .colorbar-label {
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
    }
    #colorbarImg {
      width: 16px;
      flex-grow: 1;
      margin: 6px 0;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      object-fit: fill;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
    button, select, input[type="number"] {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    button { cursor: pointer; }
    .primary { border-color: var(--accent); }
    .danger { background: var(--danger); }
    .ok { background: var(--ok); }
    .warn { background: var(--warn); }
    .pill {
      display: inline-block;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: var(--panel2);
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .status-item {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }
    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .value {
      font-size: 16px;
      font-weight: 600;
      word-break: break-word;
    }
    .note {
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }
    a.back {
      color: #9cc6ff;
      text-decoration: none;
    }
    #feedback {
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
    }
    .busy {
      outline: 1px solid var(--accent);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <div class="row" style="justify-content: space-between;">
        <h1 style="margin: 0;">P2Pro Live Viewer</h1>
        <a class="back" href="/">← Zur Startseite</a>
      </div>

      <div class="row">
        <span class="pill" id="connState">Verbinde…</span>
        <span class="pill" id="recState">Recording: -</span>
        <span class="pill" id="gainState">Gain: -</span>
        <span class="pill" id="paletteState">Palette: -</span>
      </div>

      <div class="stream-wrap" id="streamWrap">
        <img id="liveImage" class="stream" src="/api/stream" alt="Livebild" draggable="false" />

        <div id="colorbarContainer">
          <span class="colorbar-label" id="colorbarMax">MAX</span>
          <img id="colorbarImg" src="" alt="Farbskala" />
          <span class="colorbar-label" id="colorbarMin">MIN</span>
        </div>

        <canvas id="overlay" class="overlay"></canvas>
      </div>

      <div class="row" style="margin-top: 12px;">
        <button id="reconnectBtn" class="primary">Stream neu verbinden</button>
        <button id="screenshotBtn">Screenshot</button>
        <button id="recordStartBtn" class="ok">Recording Start</button>
        <button id="recordStopBtn" class="danger">Recording Stop</button>
        <button id="gainBtn">Gain umschalten</button>
      </div>

      <div id="feedback">Bereit.</div>
    </section>

    <aside class="panel">
      <h2 style="margin-top: 0;">Steuerung</h2>

      <div class="row">
        <label for="paletteSelect">Palette</label>
        <select id="paletteSelect"></select>
      </div>

      <div class="row">
        <label for="emissivityInput">Emissivität</label>
        <input id="emissivityInput" type="number" min="0.01" max="1.00" step="0.01" value="0.95" />
      </div>

      <label class="checkbox-row">
        <input type="checkbox" id="showMinMaxToggle" />
        Min/Max Marker im Bild
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="showColorbarToggle" />
        Farbskala (Legende) anzeigen
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="showHoverToggle" />
        Live-Hover Temperatur
      </label>

      <div class="status-grid">
        <div class="status-item">
          <div class="label">Kamera</div>
          <div id="cameraState" class="value">-</div>
        </div>
        <div class="status-item">
          <div class="label">Letztes Frame</div>
          <div id="frameState" class="value">-</div>
        </div>
        <div class="status-item">
          <div class="label">Messpunkte</div>
          <div id="pointsState" class="value">-</div>
        </div>
        <div class="status-item">
          <div class="label">Temperaturbereich</div>
          <div id="tempRangeState" class="value">-</div>
        </div>
      </div>

      <p class="note" style="margin-top: 14px;">
        <strong>Tipp:</strong> Mit aktiviertem "Live-Hover" kannst du die Maus über das Bild bewegen, um die Temperatur sofort auszulesen.
      </p>
    </aside>
  </div>

  <script>
    const liveImage = document.getElementById("liveImage");
    const overlay = document.getElementById("overlay");
    const colorbarContainer = document.getElementById("colorbarContainer");
    const colorbarImg = document.getElementById("colorbarImg");
    const colorbarMax = document.getElementById("colorbarMax");
    const colorbarMin = document.getElementById("colorbarMin");

    const connState = document.getElementById("connState");
    const recState = document.getElementById("recState");
    const gainState = document.getElementById("gainState");
    const paletteState = document.getElementById("paletteState");
    const cameraState = document.getElementById("cameraState");
    const frameState = document.getElementById("frameState");
    const pointsState = document.getElementById("pointsState");
    const tempRangeState = document.getElementById("tempRangeState");
    const paletteSelect = document.getElementById("paletteSelect");
    const emissivityInput = document.getElementById("emissivityInput");

    const showMinMaxToggle = document.getElementById("showMinMaxToggle");
    const showColorbarToggle = document.getElementById("showColorbarToggle");
    const showHoverToggle = document.getElementById("showHoverToggle");

    const reconnectBtn = document.getElementById("reconnectBtn");
    const screenshotBtn = document.getElementById("screenshotBtn");
    const recordStartBtn = document.getElementById("recordStartBtn");
    const recordStopBtn = document.getElementById("recordStopBtn");
    const gainBtn = document.getElementById("gainBtn");

    const feedback = document.getElementById("feedback");

    let emissivityTimer = null;
    let suppressPaletteChange = false;

    let frameWidth = 0;
    let frameHeight = 0;

    let currentPoints = [];
    let minPos = null;
    let maxPos = null;
    let globalMinTemp = null;
    let globalMaxTemp = null;
    let lastPaletteName = null;

    let dragIndex = -1;
    let isDragging = false;
    let clickStartX = 0;
    let clickStartY = 0;

    let hoverX = null;
    let hoverY = null;
    let hoverTemp = null;
    let lastHoverImageX = null;
    let lastHoverImageY = null;
    let hoverPollInterval = null;

    async function apiGet(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`GET ${url} failed: ${res.status}`);
      return res.json();
    }

    async function apiPost(url, body = {}) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(`POST ${url} failed: ${res.status} ${text}`);
      }

      const contentType = res.headers.get("content-type") || "";
      if (contentType.includes("application/json")) {
        return res.json();
      }

      return {};
    }

    function setFeedback(text, isError = false) {
      feedback.textContent = text;
      feedback.style.color = isError ? "#ff9aa5" : "#aab3c2";
    }

    function reconnectStream() {
      liveImage.src = `/api/stream?t=${Date.now()}`;
      setFeedback("Stream neu verbunden.");
    }

    function resizeOverlay() {
      const rect = liveImage.getBoundingClientRect();
      overlay.width = Math.max(1, Math.round(rect.width));
      overlay.height = Math.max(1, Math.round(rect.height));
      drawPoints();
    }

    function drawPointLabel(ctx, x, y, label, bgColor = "rgba(0, 0, 0, 0.75)") {
      ctx.font = "13px Arial";
      const paddingX = 6;
      const textWidth = ctx.measureText(label).width;
      const boxWidth = textWidth + paddingX * 2;
      const boxHeight = 22;

      let boxX = x + 12;
      let boxY = y - 30;

      if (boxX + boxWidth > overlay.width) boxX = x - boxWidth - 12;
      if (boxY < 0) boxY = y + 12;

      ctx.fillStyle = bgColor;
      ctx.fillRect(boxX, boxY, boxWidth, boxHeight);
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.fillText(label, boxX + paddingX, boxY + 15);
    }

    function drawCrosshair(ctx, x, y, color) {
      ctx.beginPath();
      ctx.arc(x, y, 7, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.95)";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x - 12, y); ctx.lineTo(x + 12, y);
      ctx.moveTo(x, y - 12); ctx.lineTo(x, y + 12);
      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
      ctx.stroke();
    }

    function drawPoints() {
      const ctx = overlay.getContext("2d");
      ctx.clearRect(0, 0, overlay.width, overlay.height);

      if (!frameWidth || !frameHeight) return;

      if (showMinMaxToggle.checked && minPos && maxPos && globalMinTemp !== null && globalMaxTemp !== null) {
        const mx = (minPos[0] / frameWidth) * overlay.width;
        const my = (minPos[1] / frameHeight) * overlay.height;
        drawCrosshair(ctx, mx, my, "rgba(30, 144, 255, 0.8)");
        drawPointLabel(ctx, mx, my, `MIN: ${globalMinTemp.toFixed(1)} °C`, "rgba(0, 50, 150, 0.8)");

        const hx = (maxPos[0] / frameWidth) * overlay.width;
        const hy = (maxPos[1] / frameHeight) * overlay.height;
        drawCrosshair(ctx, hx, hy, "rgba(255, 71, 87, 0.8)");
        drawPointLabel(ctx, hx, hy, `MAX: ${globalMaxTemp.toFixed(1)} °C`, "rgba(150, 0, 0, 0.8)");
      }

      for (let i = 0; i < currentPoints.length; i++) {
        const point = currentPoints[i];
        const x = (point.x / frameWidth) * overlay.width;
        const y = (point.y / frameHeight) * overlay.height;

        const color = (i === dragIndex) ? "rgba(255, 200, 80, 0.8)" : "rgba(255, 80, 80, 0.95)";
        drawCrosshair(ctx, x, y, color);

        ctx.font = "14px Arial";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(String(i + 1), x + 10, y - 10);

        const tempText = point.temp_c === null ? `P${i + 1}: --.- °C` : `P${i + 1}: ${point.temp_c.toFixed(1)} °C`;
        drawPointLabel(ctx, x, y, tempText);
      }

      if (showHoverToggle.checked && hoverX !== null && hoverY !== null && hoverTemp !== null) {
        ctx.beginPath();
        ctx.arc(hoverX, hoverY, 4, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.fill();
        drawPointLabel(ctx, hoverX, hoverY, `${hoverTemp.toFixed(1)} °C`, "rgba(80, 80, 80, 0.95)");
      }
    }

    async function loadStatus() {
      if (isDragging) return;

      try {
        const data = await apiGet("/api/status");
        connState.textContent = "Verbunden";
        recState.textContent = `Recording: ${data.recording}`;
        gainState.textContent = `Gain: ${data.gain}`;
        paletteState.textContent = `Palette: ${data.palette}`;
        frameState.textContent = String(data.last_frame_num);
        cameraState.textContent = data.camera_connected ?? "Unbekannt";

        if (typeof data.frame_width === "number") frameWidth = data.frame_width;
        if (typeof data.frame_height === "number") frameHeight = data.frame_height;

        minPos = data.min_pos;
        maxPos = data.max_pos;
        globalMinTemp = data.temp_min_c;
        globalMaxTemp = data.temp_max_c;

        if (Array.isArray(data.points_with_temp)) {
          currentPoints = data.points_with_temp;
          pointsState.textContent = String(currentPoints.length);
        }

        if (globalMinTemp !== null && globalMaxTemp !== null) {
          tempRangeState.textContent = `${globalMinTemp} °C bis ${globalMaxTemp} °C`;
        } else {
          tempRangeState.textContent = "-";
        }

        if (showColorbarToggle.checked) {
          colorbarContainer.style.display = "flex";
          if (globalMaxTemp !== null) colorbarMax.textContent = globalMaxTemp.toFixed(1) + " °C";
          if (globalMinTemp !== null) colorbarMin.textContent = globalMinTemp.toFixed(1) + " °C";

          if (data.palette !== lastPaletteName) {
            colorbarImg.src = `/api/colorbar?palette=${encodeURIComponent(data.palette)}&t=${Date.now()}`;
            lastPaletteName = data.palette;
          }
        } else {
          colorbarContainer.style.display = "none";
        }

        if (Array.isArray(data.available_palettes) && paletteSelect.options.length === 0) {
          suppressPaletteChange = true;
          for (const palette of data.available_palettes) {
            const opt = document.createElement("option");
            opt.value = palette;
            opt.textContent = palette;
            paletteSelect.appendChild(opt);
          }
          suppressPaletteChange = false;
        }

        if (paletteSelect.value !== data.palette) {
          suppressPaletteChange = true;
          paletteSelect.value = data.palette;
          suppressPaletteChange = false;
        }

        drawPoints();
      } catch (err) {
        connState.textContent = "Fehler";
        cameraState.textContent = "Nicht erreichbar";
      }
    }

    function getMouseImageCoords(event) {
      const rect = overlay.getBoundingClientRect();
      const displayX = event.clientX - rect.left;
      const displayY = event.clientY - rect.top;
      const imageX = Math.round((displayX / rect.width) * frameWidth);
      const imageY = Math.round((displayY / rect.height) * frameHeight);
      return { imageX, imageY, displayX, displayY };
    }

    overlay.addEventListener("mousedown", (event) => {
      if (!frameWidth) return;
      const { displayX, displayY } = getMouseImageCoords(event);
      clickStartX = displayX;
      clickStartY = displayY;
      isDragging = false;
      dragIndex = -1;

      for (let i = 0; i < currentPoints.length; i++) {
        const px = (currentPoints[i].x / frameWidth) * overlay.width;
        const py = (currentPoints[i].y / frameHeight) * overlay.height;
        if (Math.hypot(px - displayX, py - displayY) < 15) {
          dragIndex = i;
          break;
        }
      }
    });

    overlay.addEventListener("mousemove", (event) => {
      if (!frameWidth) return;
      const { imageX, imageY, displayX, displayY } = getMouseImageCoords(event);

      if (dragIndex !== -1) {
        if (!isDragging && Math.hypot(displayX - clickStartX, displayY - clickStartY) > 3) {
          isDragging = true;
        }

        if (isDragging) {
          currentPoints[dragIndex].x = imageX;
          currentPoints[dragIndex].y = imageY;
          drawPoints();
        }
      } else if (showHoverToggle.checked) {
        hoverX = displayX;
        hoverY = displayY;
        lastHoverImageX = imageX;
        lastHoverImageY = imageY;
        startHoverPoll();
      }
    });

    overlay.addEventListener("mouseup", async (event) => {
      if (!frameWidth) return;
      const { imageX, imageY } = getMouseImageCoords(event);

      if (isDragging && dragIndex !== -1) {
        try {
          const result = await apiPost("/api/point/move", { index: dragIndex, x: imageX, y: imageY });
          currentPoints = result.points_with_temp;
          drawPoints();
        } catch (err) {
          setFeedback(`Punkt konnte nicht verschoben werden: ${err.message}`, true);
        }
      } else if (dragIndex === -1) {
        try {
          const result = await apiPost("/api/point", { x: imageX, y: imageY });
          currentPoints = result.points_with_temp;
          drawPoints();
        } catch (err) {
          setFeedback(`Punkt konnte nicht gesetzt werden: ${err.message}`, true);
        }
      }

      isDragging = false;
      dragIndex = -1;
    });

    overlay.addEventListener("mouseleave", () => {
      isDragging = false;
      dragIndex = -1;
      stopHoverPoll();
      hoverTemp = null;
      drawPoints();
    });

    function startHoverPoll() {
      if (hoverPollInterval) return;
      hoverPollInterval = setInterval(async () => {
        if (lastHoverImageX === null || !showHoverToggle.checked) return;
        try {
          const res = await apiGet(`/api/hover?x=${lastHoverImageX}&y=${lastHoverImageY}`);
          hoverTemp = res.temp_c;
          drawPoints();
        } catch (e) {}
      }, 200);
    }

    function stopHoverPoll() {
      clearInterval(hoverPollInterval);
      hoverPollInterval = null;
      hoverX = null;
      hoverY = null;
      lastHoverImageX = null;
      lastHoverImageY = null;
    }

    showMinMaxToggle.addEventListener("change", drawPoints);
    showColorbarToggle.addEventListener("change", loadStatus);
    showHoverToggle.addEventListener("change", () => {
      if (!showHoverToggle.checked) {
        stopHoverPoll();
        hoverTemp = null;
        drawPoints();
      }
    });

    async function applyPalette() {
      if (suppressPaletteChange) return;
      paletteSelect.classList.add("busy");
      try {
        await apiPost("/api/palette", { palette: paletteSelect.value });
        setFeedback(`Palette gesetzt: ${paletteSelect.value}`);
        await loadStatus();
      } catch (err) {
        setFeedback(`Palette konnte nicht gesetzt werden: ${err.message}`, true);
      } finally {
        paletteSelect.classList.remove("busy");
      }
    }

    async function applyEmissivity() {
      let value = parseFloat(emissivityInput.value);
      if (Number.isNaN(value)) return;

      value = Math.max(0.01, Math.min(1.00, value));
      emissivityInput.classList.add("busy");

      try {
        await apiPost("/api/emissivity", { emissivity: value });
        setFeedback(`Emissivität gesetzt: ${value.toFixed(2)}`);
        await loadStatus();
      } catch (err) {
        setFeedback(`Emissivität konnte nicht gesetzt werden: ${err.message}`, true);
      } finally {
        emissivityInput.classList.remove("busy");
      }
    }

    async function takeScreenshot() {
      screenshotBtn.classList.add("busy");
      screenshotBtn.disabled = true;

      try {
        const result = await apiPost("/api/screenshot");
        const info = result.path || result.filename || result.message || "Screenshot gespeichert.";
        setFeedback(`Screenshot: ${info}`);
        await loadStatus();
      } catch (err) {
        setFeedback(`Screenshot fehlgeschlagen: ${err.message}`, true);
      } finally {
        screenshotBtn.classList.remove("busy");
        screenshotBtn.disabled = false;
      }
    }

    async function startRecording() {
      recordStartBtn.classList.add("busy");
      recordStartBtn.disabled = true;

      try {
        const result = await apiPost("/api/record/start");
        const info = result.message || "Recording gestartet.";
        setFeedback(info);
        await loadStatus();
      } catch (err) {
        setFeedback(`Recording Start fehlgeschlagen: ${err.message}`, true);
      } finally {
        recordStartBtn.classList.remove("busy");
        recordStartBtn.disabled = false;
      }
    }

    async function stopRecording() {
      recordStopBtn.classList.add("busy");
      recordStopBtn.disabled = true;

      try {
        const result = await apiPost("/api/record/stop");
        const info = result.path || result.filename || result.message || "Recording gestoppt.";
        setFeedback(`Recording Stop: ${info}`);
        await loadStatus();
      } catch (err) {
        setFeedback(`Recording Stop fehlgeschlagen: ${err.message}`, true);
      } finally {
        recordStopBtn.classList.remove("busy");
        recordStopBtn.disabled = false;
      }
    }

    async function toggleGain() {
      gainBtn.classList.add("busy");
      gainBtn.disabled = true;

      try {
        const result = await apiPost("/api/gain");
        const info = result.gain || result.message || "Gain umgeschaltet.";
        setFeedback(`Gain: ${info}`);
        await loadStatus();
      } catch (err) {
        setFeedback(`Gain konnte nicht umgeschaltet werden: ${err.message}`, true);
      } finally {
        gainBtn.classList.remove("busy");
        gainBtn.disabled = false;
      }
    }

    paletteSelect.addEventListener("change", applyPalette);
    emissivityInput.addEventListener("input", () => {
      clearTimeout(emissivityTimer);
      emissivityTimer = setTimeout(applyEmissivity, 450);
    });

    reconnectBtn.addEventListener("click", reconnectStream);
    screenshotBtn.addEventListener("click", takeScreenshot);
    recordStartBtn.addEventListener("click", startRecording);
    recordStopBtn.addEventListener("click", stopRecording);
    gainBtn.addEventListener("click", toggleGain);

    liveImage.addEventListener("load", resizeOverlay);
    window.addEventListener("resize", resizeOverlay);

    setInterval(loadStatus, 1000);
    reconnectStream();
    loadStatus();
    resizeOverlay();
  </script>
</body>
</html>
