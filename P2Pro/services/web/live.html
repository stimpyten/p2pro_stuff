<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2Pro Live Viewer</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c23;
      --panel2: #222833;
      --text: #e9edf3;
      --muted: #aab3c2;
      --border: #2d3440;
      --accent: #3f8cff;
      --danger: #7e3140;
      --ok: #245942;
      --warn: #7a6427;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
    }
    .wrap {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.7fr);
      gap: 16px;
      padding: 16px;
      min-height: 100vh;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }
    .stream-wrap {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .stream {
      width: 100%;
      display: block;
      background: #000;
    }
    .overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      cursor: crosshair;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }
    button, select, input {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
    }
    button { cursor: pointer; }
    .primary { border-color: var(--accent); }
    .danger { background: var(--danger); }
    .ok { background: var(--ok); }
    .warn { background: var(--warn); }
    .pill {
      display: inline-block;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid var(--border);
      background: var(--panel2);
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    .status-item {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }
    .label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .value {
      font-size: 16px;
      font-weight: 600;
      word-break: break-word;
    }
    .note {
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }
    a.back {
      color: #9cc6ff;
      text-decoration: none;
    }
    #feedback {
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
    }
    .busy {
      outline: 1px solid var(--accent);
    }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <div class="row" style="justify-content: space-between;">
        <h1 style="margin: 0;">P2Pro Live Viewer</h1>
        <a class="back" href="/">← Zur Startseite</a>
      </div>

      <div class="row">
        <span class="pill" id="connState">Verbinde…</span>
        <span class="pill" id="recState">Recording: -</span>
        <span class="pill" id="gainState">Gain: -</span>
        <span class="pill" id="paletteState">Palette: -</span>
      </div>

      <div class="stream-wrap" id="streamWrap">
        <img id="liveImage" class="stream" src="/api/stream" alt="Livebild" />
        <canvas id="overlay" class="overlay"></canvas>
      </div>

      <div class="row" style="margin-top: 12px;">
        <button id="reconnectBtn" class="primary">Stream neu verbinden</button>
        <button id="screenshotBtn">Screenshot</button>
        <button id="recordStartBtn" class="ok">Recording Start</button>
        <button id="recordStopBtn" class="danger">Recording Stop</button>
        <button id="gainBtn">Gain umschalten</button>
      </div>

      <div id="feedback">Bereit.</div>
    </section>

    <aside class="panel">
      <h2 style="margin-top: 0;">Steuerung</h2>

      <div class="row">
        <label for="paletteSelect">Palette</label>
        <select id="paletteSelect"></select>
      </div>

      <div class="row">
        <label for="emissivityInput">Emissivität</label>
        <input id="emissivityInput" type="number" min="0.01" max="1.00" step="0.01" value="0.95" />
      </div>

      <div class="status-grid">
        <div class="status-item">
          <div class="label">Kamera</div>
          <div id="cameraState" class="value">-</div>
        </div>
        <div class="status-item">
          <div class="label">Letztes Frame</div>
          <div id="frameState" class="value">-</div>
        </div>
        <div class="status-item">
          <div class="label">Messpunkte</div>
          <div id="pointsState" class="value">-</div>
        </div>
        <div class="status-item">
          <div class="label">Temperaturbereich</div>
          <div id="tempRangeState" class="value">-</div>
        </div>
      </div>

      <p class="note" style="margin-top: 14px;">
        Klick ins Bild setzt einen Messpunkt. Klick nahe an einem bestehenden Punkt löscht ihn wieder. Die Temperatur erscheint direkt am Marker.
      </p>
    </aside>
  </div>

  <script>
    const liveImage = document.getElementById("liveImage");
    const overlay = document.getElementById("overlay");

    const connState = document.getElementById("connState");
    const recState = document.getElementById("recState");
    const gainState = document.getElementById("gainState");
    const paletteState = document.getElementById("paletteState");
    const cameraState = document.getElementById("cameraState");
    const frameState = document.getElementById("frameState");
    const pointsState = document.getElementById("pointsState");
    const tempRangeState = document.getElementById("tempRangeState");
    const paletteSelect = document.getElementById("paletteSelect");
    const emissivityInput = document.getElementById("emissivityInput");
    const feedback = document.getElementById("feedback");

    let emissivityTimer = null;
    let suppressPaletteChange = false;

    let frameWidth = 0;
    let frameHeight = 0;
    let currentPoints = [];

    async function apiGet(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`GET ${url} failed: ${res.status}`);
      return res.json();
    }

    async function apiPost(url, body = {}) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const text = await res.text();
        throw new Error(`POST ${url} failed: ${res.status} ${text}`);
      }
      return res.json();
    }

    function setFeedback(text, isError = false) {
      feedback.textContent = text;
      feedback.style.color = isError ? "#ff9aa5" : "#aab3c2";
    }

    function reconnectStream() {
      liveImage.src = `/api/stream?t=${Date.now()}`;
      setFeedback("Stream neu verbunden.");
    }

    function resizeOverlay() {
      const rect = liveImage.getBoundingClientRect();
      overlay.width = Math.max(1, Math.round(rect.width));
      overlay.height = Math.max(1, Math.round(rect.height));
      drawPoints();
    }

    function drawPointLabel(ctx, x, y, label) {
      ctx.font = "13px Arial";
      const paddingX = 6;
      const paddingY = 4;
      const textWidth = ctx.measureText(label).width;
      const boxWidth = textWidth + paddingX * 2;
      const boxHeight = 22;

      let boxX = x + 12;
      let boxY = y - 30;

      if (boxX + boxWidth > overlay.width) {
        boxX = x - boxWidth - 12;
      }
      if (boxY < 0) {
        boxY = y + 12;
      }

      ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
      ctx.fillRect(boxX, boxY, boxWidth, boxHeight);

      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 1;
      ctx.strokeRect(boxX, boxY, boxWidth, boxHeight);

      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.fillText(label, boxX + paddingX, boxY + 15);
    }

    function drawPoints() {
      const ctx = overlay.getContext("2d");
      ctx.clearRect(0, 0, overlay.width, overlay.height);

      if (!frameWidth || !frameHeight) return;

      for (let i = 0; i < currentPoints.length; i++) {
        const point = currentPoints[i];
        const px = point.x;
        const py = point.y;

        const x = (px / frameWidth) * overlay.width;
        const y = (py / frameHeight) * overlay.height;

        ctx.beginPath();
        ctx.arc(x, y, 7, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255, 80, 80, 0.95)";
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255,255,255,0.95)";
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x - 12, y);
        ctx.lineTo(x + 12, y);
        ctx.moveTo(x, y - 12);
        ctx.lineTo(x, y + 12);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
        ctx.stroke();

        ctx.font = "14px Arial";
        ctx.fillStyle = "rgba(255,255,255,0.95)";
        ctx.fillText(String(i + 1), x + 10, y - 10);

        const tempText = point.temp_c === null || point.temp_c === undefined
          ? `P${i + 1}: --.- °C`
          : `P${i + 1}: ${point.temp_c.toFixed(1)} °C`;

        drawPointLabel(ctx, x, y, tempText);
      }
    }

    async function loadStatus() {
      try {
        const data = await apiGet("/api/status");
        connState.textContent = "Verbunden";
        recState.textContent = `Recording: ${data.recording}`;
        gainState.textContent = `Gain: ${data.gain}`;
        paletteState.textContent = `Palette: ${data.palette}`;
        cameraState.textContent = data.camera_initialized ? "initialisiert" : "nicht initialisiert";
        frameState.textContent = String(data.last_frame_num);

        if (typeof data.frame_width === "number" && typeof data.frame_height === "number") {
          frameWidth = data.frame_width;
          frameHeight = data.frame_height;
        }

        if (Array.isArray(data.points_with_temp)) {
          currentPoints = data.points_with_temp;
          pointsState.textContent = String(currentPoints.length);
        } else if (Array.isArray(data.points)) {
          currentPoints = data.points.map(([x, y]) => ({ x, y, temp_c: null }));
          pointsState.textContent = String(currentPoints.length);
        } else {
          currentPoints = [];
          pointsState.textContent = "-";
        }

        if (typeof data.temp_min_c === "number" && typeof data.temp_max_c === "number") {
          tempRangeState.textContent = `${data.temp_min_c} °C bis ${data.temp_max_c} °C`;
        } else {
          tempRangeState.textContent = "-";
        }

        if (Array.isArray(data.available_palettes) && paletteSelect.options.length === 0) {
          suppressPaletteChange = true;
          for (const palette of data.available_palettes) {
            const opt = document.createElement("option");
            opt.value = palette;
            opt.textContent = palette;
            if (palette === data.palette) opt.selected = true;
            paletteSelect.appendChild(opt);
          }
          suppressPaletteChange = false;
        } else {
          suppressPaletteChange = true;
          paletteSelect.value = data.palette;
          suppressPaletteChange = false;
        }

        drawPoints();
      } catch (err) {
        connState.textContent = "Fehler";
        console.error(err);
        setFeedback("Status konnte nicht geladen werden.", true);
      }
    }

    async function applyPalette() {
      if (suppressPaletteChange) return;
      const value = paletteSelect.value;
      paletteSelect.classList.add("busy");
      setFeedback(`Palette wird gesetzt: ${value} ...`);
      try {
        await apiPost("/api/palette", { palette: value });
        await loadStatus();
        setFeedback(`Palette gesetzt: ${value}`);
      } catch (err) {
        console.error(err);
        setFeedback("Palette setzen fehlgeschlagen.", true);
      } finally {
        paletteSelect.classList.remove("busy");
      }
    }

    async function applyEmissivity() {
      let value = parseFloat(emissivityInput.value);
      if (Number.isNaN(value)) {
        setFeedback("Ungültige Emissivität.", true);
        return;
      }

      if (value < 0.01) value = 0.01;
      if (value > 1.00) value = 1.00;
      emissivityInput.value = value.toFixed(2);

      emissivityInput.classList.add("busy");
      setFeedback(`Emissivität wird gesetzt: ${emissivityInput.value} ...`);

      try {
        await apiPost("/api/emissivity", { emissivity: value });
        await loadStatus();
        setFeedback(`Emissivität gesetzt: ${emissivityInput.value}`);
      } catch (err) {
        console.error(err);
        setFeedback("Emissivität setzen fehlgeschlagen.", true);
      } finally {
        emissivityInput.classList.remove("busy");
      }
    }

    function scheduleEmissivityApply() {
      if (emissivityTimer) clearTimeout(emissivityTimer);
      emissivityTimer = setTimeout(() => {
        applyEmissivity();
      }, 450);
    }

    async function handleOverlayClick(event) {
      if (!frameWidth || !frameHeight) {
        setFeedback("Noch keine Bildgröße verfügbar.", true);
        return;
      }

      const rect = overlay.getBoundingClientRect();
      const displayX = event.clientX - rect.left;
      const displayY = event.clientY - rect.top;

      const imageX = Math.round((displayX / rect.width) * frameWidth);
      const imageY = Math.round((displayY / rect.height) * frameHeight);

      try {
        const result = await apiPost("/api/point", { x: imageX, y: imageY });
        if (Array.isArray(result.points_with_temp)) {
          currentPoints = result.points_with_temp;
          pointsState.textContent = String(currentPoints.length);
        }
        drawPoints();
        setFeedback(`Messpunkt aktualisiert bei (${imageX}, ${imageY}).`);
      } catch (err) {
        console.error(err);
        setFeedback("Messpunkt konnte nicht gesetzt werden.", true);
      }
    }

    document.getElementById("reconnectBtn").addEventListener("click", reconnectStream);

    document.getElementById("screenshotBtn").addEventListener("click", async () => {
      setFeedback("Screenshot wird gespeichert ...");
      try {
        const result = await apiPost("/api/screenshot");
        if (result.saved) {
          setFeedback(`Screenshot gespeichert: ${result.saved}`);
        } else {
          setFeedback("Screenshot konnte nicht gespeichert werden.", true);
        }
      } catch (err) {
        console.error(err);
        setFeedback("Screenshot fehlgeschlagen.", true);
      }
    });

    document.getElementById("recordStartBtn").addEventListener("click", async () => {
      setFeedback("Recording wird gestartet ...");
      try {
        await apiPost("/api/record/start");
        await loadStatus();
        setFeedback("Recording gestartet.");
      } catch (err) {
        console.error(err);
        setFeedback("Recording Start fehlgeschlagen.", true);
      }
    });

    document.getElementById("recordStopBtn").addEventListener("click", async () => {
      setFeedback("Recording wird gestoppt ...");
      try {
        await apiPost("/api/record/stop");
        await loadStatus();
        setFeedback("Recording gestoppt.");
      } catch (err) {
        console.error(err);
        setFeedback("Recording Stop fehlgeschlagen.", true);
      }
    });

    document.getElementById("gainBtn").addEventListener("click", async () => {
      setFeedback("Gain wird umgeschaltet ...");
      try {
        await apiPost("/api/gain");
        await loadStatus();
        setFeedback("Gain umgeschaltet.");
      } catch (err) {
        console.error(err);
        setFeedback("Gain umschalten fehlgeschlagen.", true);
      }
    });

    paletteSelect.addEventListener("change", applyPalette);
    emissivityInput.addEventListener("input", scheduleEmissivityApply);
    emissivityInput.addEventListener("change", applyEmissivity);
    emissivityInput.addEventListener("blur", applyEmissivity);

    overlay.addEventListener("click", handleOverlayClick);
    liveImage.addEventListener("load", resizeOverlay);
    window.addEventListener("resize", resizeOverlay);

    setInterval(loadStatus, 1000);

    reconnectStream();
    loadStatus();
    resizeOverlay();
  </script>
</body>
</html>
